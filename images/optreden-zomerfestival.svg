<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky-z" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3520"/>
      <stop offset="45%" stop-color="#4a7a1a"/>
      <stop offset="100%" stop-color="#8ab040"/>
    </linearGradient>
    <linearGradient id="field-z" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2508"/>
      <stop offset="100%" stop-color="#0d1504"/>
    </linearGradient>
    <radialGradient id="sun-z" cx="75%" cy="20%" r="20%">
      <stop offset="0%" stop-color="rgba(255,230,80,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,230,80,0)"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky-z)"/>
  <rect width="800" height="500" fill="url(#sun-z)"/>

  <!-- Sun -->
  <circle cx="620" cy="90" r="40" fill="rgba(255,230,60,0.55)"/>
  <circle cx="620" cy="90" r="28" fill="rgba(255,220,40,0.7)"/>

  <!-- Trees background -->
  <!-- Tree clusters -->
  <rect x="0" y="200" width="40" height="200" fill="#0d1a06" rx="2"/>
  <polygon points="20,80 -20,210 60,210" fill="#142208"/>
  <polygon points="20,120 -10,220 50,220" fill="#1a2d0a"/>

  <rect x="50" y="220" width="30" height="180" fill="#0d1a06" rx="2"/>
  <polygon points="65,110 30,225 100,225" fill="#1a2d0a"/>
  <polygon points="65,150 38,228 92,228" fill="#142208"/>

  <rect x="700" y="195" width="40" height="205" fill="#0d1a06" rx="2"/>
  <polygon points="720,75 680,205 760,205" fill="#142208"/>
  <polygon points="720,115 688,210 752,210" fill="#1a2d0a"/>

  <rect x="745" y="215" width="30" height="185" fill="#0d1a06" rx="2"/>
  <polygon points="760,105 728,220 792,220" fill="#1a2d0a"/>

  <!-- Ground / field -->
  <rect y="360" width="800" height="140" fill="url(#field-z)"/>
  <!-- Grass texture suggestion -->
  <rect y="355" width="800" height="12" fill="rgba(80,140,20,0.4)" rx="2"/>

  <!-- Stage structure -->
  <rect x="160" y="200" width="480" height="168" fill="#0f0f08" rx="4"/>
  <!-- Stage roof -->
  <rect x="150" y="185" width="500" height="22" fill="#1a1a10" rx="3"/>
  <polygon points="150,185 400,145 650,185" fill="#111108"/>
  <rect x="148" y="180" width="504" height="8" fill="#c9a84c" rx="2"/>

  <!-- Stage lights (colorful for festival) -->
  <polygon points="230,207 205,145 255,145" fill="rgba(255,80,80,0.12)"/>
  <polygon points="320,207 295,145 345,145" fill="rgba(80,160,255,0.12)"/>
  <polygon points="400,207 375,145 425,145" fill="rgba(255,230,60,0.14)"/>
  <polygon points="480,207 455,145 505,145" fill="rgba(80,255,160,0.10)"/>
  <polygon points="570,207 545,145 595,145" fill="rgba(255,80,80,0.12)"/>

  <!-- Light circles on stage -->
  <ellipse cx="230" cy="210" rx="35" ry="10" fill="rgba(255,80,80,0.18)"/>
  <ellipse cx="320" cy="210" rx="35" ry="10" fill="rgba(80,160,255,0.18)"/>
  <ellipse cx="400" cy="210" rx="35" ry="10" fill="rgba(255,230,60,0.20)"/>
  <ellipse cx="480" cy="210" rx="35" ry="10" fill="rgba(80,255,160,0.15)"/>
  <ellipse cx="570" cy="210" rx="35" ry="10" fill="rgba(255,80,80,0.18)"/>

  <!-- Musician silhouettes (festival energy - more dynamic poses) -->
  <circle cx="240" cy="255" r="11" fill="#0d0d0d"/>
  <rect x="232" y="265" width="16" height="40" fill="#0d0d0d" rx="2"/>
  <line x1="248" y1="265" x2="268" y2="258" stroke="#0d0d0d" stroke-width="5"/><!-- trompet reach up -->

  <circle cx="300" cy="248" r="12" fill="#0d0d0d"/>
  <rect x="291" y="259" width="18" height="44" fill="#0d0d0d" rx="2"/>
  <circle cx="316" cy="255" r="19" fill="none" stroke="#0d0d0d" stroke-width="5"/>

  <circle cx="370" cy="240" r="13" fill="#0d0d0d"/><!-- lead singer/dirigent, higher energy -->
  <rect x="360" y="252" width="20" height="48" fill="#0d0d0d" rx="2"/>
  <line x1="380" y1="252" x2="400" y2="240" stroke="#0d0d0d" stroke-width="3"/>
  <line x1="360" y1="258" x2="340" y2="248" stroke="#0d0d0d" stroke-width="3"/>

  <circle cx="450" cy="252" r="12" fill="#0d0d0d"/>
  <rect x="441" y="263" width="18" height="44" fill="#0d0d0d" rx="2"/>
  <rect x="452" y="270" width="38" height="5" fill="#0d0d0d" rx="2"/>

  <circle cx="520" cy="255" r="13" fill="#0d0d0d"/>
  <rect x="511" y="267" width="20" height="46" fill="#0d0d0d" rx="2"/>
  <circle cx="535" cy="256" r="20" fill="none" stroke="#0d0d0d" stroke-width="6"/>

  <circle cx="580" cy="258" r="11" fill="#0d0d0d"/>
  <rect x="572" y="268" width="16" height="42" fill="#0d0d0d" rx="2"/>
  <ellipse cx="582" cy="288" rx="22" ry="13" fill="none" stroke="#0d0d0d" stroke-width="4"/>

  <!-- Festival crowd - slightly more energetic (arms up suggestion) -->
  <g opacity="0.88">
    <circle cx="205" cy="378" r="13" fill="#101808"/>
    <rect x="193" y="390" width="24" height="30" fill="#101808" rx="1"/>
    <line x1="205" y1="380" x2="190" y2="362" stroke="#101808" stroke-width="5"/><!-- arm up -->

    <circle cx="248" cy="372" r="12" fill="#182010"/>
    <rect x="237" y="383" width="22" height="30" fill="#182010" rx="1"/>

    <circle cx="290" cy="380" r="11" fill="#101808"/>
    <rect x="280" y="390" width="20" height="28" fill="#101808" rx="1"/>
    <line x1="290" y1="382" x2="278" y2="365" stroke="#101808" stroke-width="5"/>

    <circle cx="330" cy="374" r="13" fill="#182010"/>
    <rect x="318" y="386" width="24" height="30" fill="#182010" rx="1"/>

    <circle cx="372" cy="382" r="12" fill="#101808"/>
    <rect x="361" y="393" width="22" height="28" fill="#101808" rx="1"/>
    <line x1="372" y1="384" x2="360" y2="366" stroke="#101808" stroke-width="5"/>

    <circle cx="412" cy="375" r="11" fill="#182010"/>
    <rect x="402" y="385" width="20" height="30" fill="#182010" rx="1"/>

    <circle cx="452" cy="379" r="13" fill="#101808"/>
    <rect x="440" y="391" width="24" height="28" fill="#101808" rx="1"/>
    <line x1="452" y1="381" x2="440" y2="363" stroke="#101808" stroke-width="5"/>

    <circle cx="492" cy="373" r="12" fill="#182010"/>
    <rect x="481" y="384" width="22" height="30" fill="#182010" rx="1"/>

    <circle cx="532" cy="381" r="11" fill="#101808"/>
    <rect x="522" y="391" width="20" height="28" fill="#101808" rx="1"/>

    <circle cx="572" cy="376" r="12" fill="#182010"/>
    <rect x="561" y="387" width="22" height="30" fill="#182010" rx="1"/>
    <line x1="572" y1="378" x2="558" y2="362" stroke="#182010" stroke-width="5"/>
  </g>

  <!-- Text overlay -->
  <rect y="425" width="800" height="75" fill="rgba(0,0,0,0.72)"/>
  <text x="400" y="461" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#c9a84c" letter-spacing="2">Zomerfestival 2025</text>
  <text x="400" y="483" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.65)" letter-spacing="1">5 JULI · ERVE 'T OUDE ERF</text>
</svg>
