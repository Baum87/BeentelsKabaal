<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="eve-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060a18"/>
      <stop offset="50%" stop-color="#0d1430"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
    <radialGradient id="street-light1" cx="25%" cy="40%" r="18%">
      <stop offset="0%" stop-color="rgba(255,200,80,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,200,80,0)"/>
    </radialGradient>
    <radialGradient id="street-light2" cx="75%" cy="40%" r="18%">
      <stop offset="0%" stop-color="rgba(255,200,80,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,200,80,0)"/>
    </radialGradient>
  </defs>

  <!-- Night sky -->
  <rect width="800" height="500" fill="url(#eve-sky)"/>
  <!-- Stars -->
  <circle cx="80" cy="30" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="150" cy="55" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="230" cy="22" r="1.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="310" cy="45" r="1" fill="rgba(255,255,255,0.6)"/>
  <circle cx="440" cy="18" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="520" cy="40" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="600" cy="28" r="1.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="680" cy="50" r="1" fill="rgba(255,255,255,0.6)"/>
  <circle cx="740" cy="20" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="350" cy="35" r="1" fill="rgba(255,255,255,0.5)"/>

  <!-- Buildings (Dutch row houses) -->
  <!-- Left block -->
  <rect x="0" y="100" width="110" height="300" fill="#0d0d18"/>
  <!-- Stepped gable left 1 -->
  <polygon points="0,100 0,80 15,80 15,65 30,65 30,50 45,50 45,65 60,65 60,80 75,80 75,100" fill="#0a0a14"/>
  <polygon points="110,100 110,90 125,90 125,75 140,75 140,90 155,90 155,100" fill="#0d0d18"/>
  <!-- Windows left building -->
  <rect x="15" y="115" width="20" height="25" fill="rgba(255,200,80,0.5)" rx="1"/>
  <rect x="45" y="115" width="20" height="25" fill="rgba(255,200,80,0.3)" rx="1"/>
  <rect x="75" y="115" width="20" height="25" fill="rgba(255,200,80,0.45)" rx="1"/>
  <rect x="15" y="155" width="20" height="25" fill="rgba(255,200,80,0.25)" rx="1"/>
  <rect x="45" y="155" width="20" height="25" fill="rgba(255,200,80,0.5)" rx="1"/>
  <rect x="75" y="155" width="20" height="25" fill="rgba(255,200,80,0.35)" rx="1"/>
  <rect x="15" y="195" width="20" height="25" fill="rgba(255,200,80,0.4)" rx="1"/>
  <rect x="45" y="195" width="20" height="25" fill="rgba(255,200,80,0.2)" rx="1"/>

  <!-- Middle buildings -->
  <rect x="110" y="130" width="85" height="270" fill="#0f0f1c"/>
  <polygon points="110,130 152,100 195,130" fill="#0d0d18"/>
  <rect x="195" y="120" width="100" height="280" fill="#0c0c16"/>
  <!-- Windows middle -->
  <rect x="125" y="145" width="18" height="22" fill="rgba(255,200,80,0.4)" rx="1"/>
  <rect x="155" y="145" width="18" height="22" fill="rgba(255,200,80,0.6)" rx="1"/>
  <rect x="210" y="135" width="18" height="22" fill="rgba(255,200,80,0.45)" rx="1"/>
  <rect x="240" y="135" width="18" height="22" fill="rgba(255,200,80,0.3)" rx="1"/>
  <rect x="270" y="135" width="18" height="22" fill="rgba(255,200,80,0.5)" rx="1"/>

  <!-- Right block -->
  <rect x="690" y="100" width="110" height="300" fill="#0d0d18"/>
  <polygon points="690,100 690,80 705,80 705,65 720,65 720,50 735,50 735,65 750,65 750,80 765,80 765,95 780,95 780,100" fill="#0a0a14"/>
  <!-- Windows right building -->
  <rect x="700" y="115" width="20" height="25" fill="rgba(255,200,80,0.5)" rx="1"/>
  <rect x="730" y="115" width="20" height="25" fill="rgba(255,200,80,0.3)" rx="1"/>
  <rect x="760" y="115" width="20" height="25" fill="rgba(255,200,80,0.45)" rx="1"/>
  <rect x="700" y="155" width="20" height="25" fill="rgba(255,200,80,0.35)" rx="1"/>
  <rect x="730" y="155" width="20" height="25" fill="rgba(255,200,80,0.5)" rx="1"/>
  <rect x="505" y="125" width="85" height="275" fill="#0f0f1c"/>
  <polygon points="505,125 547,95 590,125" fill="#0d0d18"/>
  <rect x="590" y="110" width="100" height="290" fill="#0c0c16"/>
  <rect x="520" y="140" width="18" height="22" fill="rgba(255,200,80,0.4)" rx="1"/>
  <rect x="550" y="140" width="18" height="22" fill="rgba(255,200,80,0.55)" rx="1"/>
  <rect x="605" y="125" width="18" height="22" fill="rgba(255,200,80,0.4)" rx="1"/>
  <rect x="635" y="125" width="18" height="22" fill="rgba(255,200,80,0.3)" rx="1"/>
  <rect x="665" y="125" width="18" height="22" fill="rgba(255,200,80,0.5)" rx="1"/>

  <!-- Street -->
  <rect y="400" width="800" height="100" fill="#0a0910"/>
  <line x1="400" y1="400" x2="400" y2="500" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-dasharray="15,12"/>

  <!-- Street lights -->
  <line x1="200" y1="200" x2="200" y2="400" stroke="#1a1a28" stroke-width="4"/>
  <circle cx="200" cy="195" r="12" fill="#1a1a28"/>
  <ellipse cx="200" cy="205" rx="16" ry="6" fill="rgba(255,200,80,0.65)"/>
  <rect width="800" height="500" fill="url(#street-light1)"/>

  <line x1="600" y1="200" x2="600" y2="400" stroke="#1a1a28" stroke-width="4"/>
  <circle cx="600" cy="195" r="12" fill="#1a1a28"/>
  <ellipse cx="600" cy="205" rx="16" ry="6" fill="rgba(255,200,80,0.65)"/>
  <rect width="800" height="500" fill="url(#street-light2)"/>

  <!-- Festive lights strung across street -->
  <polyline points="0,260 100,250 200,260 300,250 400,260 500,250 600,260 700,250 800,260" fill="none" stroke="rgba(100,80,40,0.5)" stroke-width="1.5"/>
  <!-- Light bulbs -->
  <circle cx="100" cy="250" r="5" fill="rgba(255,200,80,0.85)"/>
  <circle cx="200" cy="260" r="5" fill="rgba(255,80,80,0.85)"/>
  <circle cx="300" cy="250" r="5" fill="rgba(80,160,255,0.85)"/>
  <circle cx="400" cy="260" r="5" fill="rgba(255,200,80,0.85)"/>
  <circle cx="500" cy="250" r="5" fill="rgba(255,80,80,0.85)"/>
  <circle cx="600" cy="260" r="5" fill="rgba(80,160,255,0.85)"/>
  <circle cx="700" cy="250" r="5" fill="rgba(255,200,80,0.85)"/>

  <!-- Marching band (parade formation) -->
  <!-- Row of musicians walking -->
  <g>
    <!-- Front row -->
    <circle cx="270" cy="348" r="11" fill="#1a0808"/>
    <rect x="262" y="358" width="18" height="40" fill="#1a0808" rx="1"/>
    <!-- Red uniform hint -->
    <rect x="263" y="360" width="16" height="20" fill="#3a0a0a" rx="1"/>
    <rect x="280" y="358" width="20" height="8" fill="#1a0808" rx="1"/><!-- trompet arm -->

    <circle cx="320" cy="345" r="11" fill="#1a0808"/>
    <rect x="312" y="355" width="18" height="42" fill="#1a0808" rx="1"/>
    <rect x="313" y="357" width="16" height="20" fill="#3a0a0a" rx="1"/>
    <rect x="330" y="355" width="22" height="6" fill="#1a0808" rx="1"/>

    <circle cx="370" cy="350" r="12" fill="#1a0808"/>
    <rect x="361" y="361" width="22" height="38" fill="#1a0808" rx="1"/>
    <rect x="362" y="363" width="20" height="18" fill="#3a0a0a" rx="1"/>
    <ellipse cx="373" cy="335" rx="12" ry="4" fill="#0d0d0d"/><!-- drum major hat -->

    <circle cx="420" cy="348" r="11" fill="#1a0808"/>
    <rect x="412" y="358" width="18" height="40" fill="#1a0808" rx="1"/>
    <rect x="413" y="360" width="16" height="20" fill="#3a0a0a" rx="1"/>

    <circle cx="468" cy="345" r="11" fill="#1a0808"/>
    <rect x="460" y="355" width="18" height="42" fill="#1a0808" rx="1"/>
    <rect x="461" y="357" width="16" height="20" fill="#3a0a0a" rx="1"/>
    <circle cx="484" cy="352" r="15" fill="none" stroke="#1a0808" stroke-width="4"/><!-- tuba -->

    <circle cx="518" cy="350" r="11" fill="#1a0808"/>
    <rect x="510" y="360" width="18" height="40" fill="#1a0808" rx="1"/>
    <rect x="511" y="362" width="16" height="18" fill="#3a0a0a" rx="1"/>

    <circle cx="565" cy="347" r="11" fill="#1a0808"/>
    <rect x="557" y="357" width="18" height="42" fill="#1a0808" rx="1"/>
    <rect x="558" y="359" width="16" height="20" fill="#3a0a0a" rx="1"/>
    <ellipse cx="567" cy="373" rx="18" ry="11" fill="none" stroke="#1a0808" stroke-width="4"/><!-- drum -->
  </g>

  <!-- Spectators on sidewalk (both sides) -->
  <g opacity="0.7">
    <circle cx="155" cy="385" r="10" fill="#10080c"/>
    <circle cx="185" cy="380" r="10" fill="#140a10"/>
    <circle cx="215" cy="388" r="10" fill="#10080c"/>
    <!-- Right spectators -->
    <circle cx="600" cy="385" r="10" fill="#10080c"/>
    <circle cx="630" cy="380" r="10" fill="#140a10"/>
    <circle cx="660" cy="388" r="10" fill="#10080c"/>
    <circle cx="688" cy="382" r="10" fill="#140a10"/>
  </g>

  <!-- Text overlay -->
  <rect y="425" width="800" height="75" fill="rgba(0,0,0,0.78)"/>
  <text x="400" y="461" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#c9a84c" letter-spacing="2">Sinterklaascorso 2025</text>
  <text x="400" y="483" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.65)" letter-spacing="1">7 DECEMBER · DORPSKERN BENTELO</text>
</svg>
