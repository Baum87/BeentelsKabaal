<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="church-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0808"/>
      <stop offset="100%" stop-color="#1a0f06"/>
    </linearGradient>
    <radialGradient id="candle-glow" cx="50%" cy="60%" r="45%">
      <stop offset="0%" stop-color="rgba(255,160,40,0.40)"/>
      <stop offset="60%" stop-color="rgba(200,100,20,0.15)"/>
      <stop offset="100%" stop-color="rgba(200,100,20,0)"/>
    </radialGradient>
    <radialGradient id="window-glow" cx="50%" cy="30%" r="30%">
      <stop offset="0%" stop-color="rgba(80,120,200,0.20)"/>
      <stop offset="100%" stop-color="rgba(80,120,200,0)"/>
    </radialGradient>
  </defs>

  <!-- Dark church interior -->
  <rect width="800" height="500" fill="url(#church-bg)"/>
  <rect width="800" height="500" fill="url(#candle-glow)"/>
  <rect width="800" height="500" fill="url(#window-glow)"/>

  <!-- Stone floor suggestion -->
  <rect y="400" width="800" height="100" fill="#110c08"/>
  <!-- Floor tile lines -->
  <line x1="0" y1="420" x2="800" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="440" x2="800" y2="440" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="460" x2="800" y2="460" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="200" y1="400" x2="200" y2="500" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="400" x2="400" y2="500" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600" y1="400" x2="600" y2="500" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Gothic arch window (center back) -->
  <rect x="330" y="30" width="140" height="200" fill="#0d1528" rx="70 70 0 0"/>
  <rect x="330" y="30" width="140" height="200" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="3" rx="70 70 0 0"/>
  <!-- Window tracery -->
  <line x1="400" y1="30" x2="400" y2="230" stroke="rgba(201,168,76,0.3)" stroke-width="2"/>
  <line x1="330" y1="130" x2="470" y2="130" stroke="rgba(201,168,76,0.2)" stroke-width="1.5"/>
  <!-- Stars in window -->
  <circle cx="385" cy="70" r="2" fill="rgba(200,220,255,0.8)"/>
  <circle cx="415" cy="55" r="1.5" fill="rgba(200,220,255,0.7)"/>
  <circle cx="400" cy="85" r="2.5" fill="rgba(200,220,255,0.9)"/>
  <circle cx="370" cy="95" r="1.5" fill="rgba(200,220,255,0.6)"/>
  <circle cx="430" cy="90" r="2" fill="rgba(200,220,255,0.7)"/>

  <!-- Side arch windows -->
  <rect x="80" y="60" width="90" height="160" fill="#0a1020" rx="45 45 0 0"/>
  <rect x="80" y="60" width="90" height="160" fill="none" stroke="rgba(201,168,76,0.25)" stroke-width="2" rx="45 45 0 0"/>
  <rect x="630" y="60" width="90" height="160" fill="#0a1020" rx="45 45 0 0"/>
  <rect x="630" y="60" width="90" height="160" fill="none" stroke="rgba(201,168,76,0.25)" stroke-width="2" rx="45 45 0 0"/>

  <!-- Pillars -->
  <rect x="60" y="0" width="22" height="500" fill="#110e0a"/>
  <rect x="718" y="0" width="22" height="500" fill="#110e0a"/>
  <rect x="170" y="0" width="18" height="500" fill="#140f0b"/>
  <rect x="612" y="0" width="18" height="500" fill="#140f0b"/>
  <rect x="270" y="180" width="16" height="320" fill="#120e0a"/>
  <rect x="514" y="180" width="16" height="320" fill="#120e0a"/>

  <!-- Altar area / stage -->
  <rect x="200" y="280" width="400" height="130" fill="#150e08" rx="3"/>
  <rect x="195" y="406" width="410" height="8" fill="rgba(201,168,76,0.6)" rx="2"/>

  <!-- Candelabras on altar -->
  <!-- Left candelabra -->
  <rect x="235" y="260" width="5" height="28" fill="#9a7a2e"/>
  <rect x="225" y="255" width="25" height="5" fill="#9a7a2e" rx="1"/>
  <rect x="222" y="282" width="6" height="18" fill="#8a6a22"/><!-- left arm -->
  <rect x="228" y="282" width="6" height="18" fill="#8a6a22"/><!-- center -->
  <rect x="234" y="282" width="6" height="18" fill="#8a6a22"/><!-- right arm -->
  <!-- Flames -->
  <ellipse cx="225" cy="278" rx="3" ry="5" fill="rgba(255,200,60,0.9)"/>
  <ellipse cx="225" cy="276" rx="2" ry="3" fill="rgba(255,240,140,0.95)"/>
  <ellipse cx="231" cy="278" rx="3" ry="5" fill="rgba(255,200,60,0.9)"/>
  <ellipse cx="231" cy="276" rx="2" ry="3" fill="rgba(255,240,140,0.95)"/>
  <ellipse cx="237" cy="278" rx="3" ry="5" fill="rgba(255,200,60,0.9)"/>
  <ellipse cx="237" cy="276" rx="2" ry="3" fill="rgba(255,240,140,0.95)"/>

  <!-- Right candelabra -->
  <rect x="560" y="260" width="5" height="28" fill="#9a7a2e"/>
  <rect x="550" y="255" width="25" height="5" fill="#9a7a2e" rx="1"/>
  <ellipse cx="552" cy="278" rx="3" ry="5" fill="rgba(255,200,60,0.9)"/>
  <ellipse cx="552" cy="276" rx="2" ry="3" fill="rgba(255,240,140,0.95)"/>
  <ellipse cx="558" cy="278" rx="3" ry="5" fill="rgba(255,200,60,0.9)"/>
  <ellipse cx="558" cy="276" rx="2" ry="3" fill="rgba(255,240,140,0.95)"/>
  <ellipse cx="564" cy="278" rx="3" ry="5" fill="rgba(255,200,60,0.9)"/>
  <ellipse cx="564" cy="276" rx="2" ry="3" fill="rgba(255,240,140,0.95)"/>

  <!-- Musicians in formal dress (darker silhouettes) -->
  <circle cx="260" cy="320" r="11" fill="#0d0a07"/>
  <rect x="252" y="330" width="16" height="42" fill="#0d0a07" rx="1"/>
  <rect x="268" y="337" width="24" height="5" fill="#0d0a07" rx="2"/>

  <circle cx="310" cy="315" r="12" fill="#100c08"/>
  <rect x="301" y="326" width="18" height="44" fill="#100c08" rx="1"/>

  <!-- Dirigent -->
  <circle cx="400" cy="305" r="13" fill="#0d0a07"/>
  <rect x="390" y="317" width="20" height="48" fill="#0d0a07" rx="1"/>
  <line x1="410" y1="317" x2="428" y2="304" stroke="#0d0a07" stroke-width="3"/>
  <line x1="390" y1="317" x2="372" y2="304" stroke="#0d0a07" stroke-width="3"/>

  <circle cx="480" cy="318" r="12" fill="#100c08"/>
  <rect x="471" y="329" width="18" height="44" fill="#100c08" rx="1"/>
  <rect x="481" y="336" width="36" height="5" fill="#100c08" rx="2"/>

  <circle cx="540" cy="320" r="11" fill="#0d0a07"/>
  <rect x="532" y="330" width="16" height="42" fill="#0d0a07" rx="1"/>

  <!-- Audience pews (silhouette) -->
  <rect x="100" y="410" width="600" height="18" fill="#0d0a07" rx="2"/><!-- pew -->
  <rect x="100" y="445" width="600" height="18" fill="#0d0a07" rx="2"/><!-- pew 2 -->
  <!-- Audience heads above pews -->
  <g opacity="0.7">
    <circle cx="140" cy="408" r="9" fill="#1a1408"/>
    <circle cx="175" cy="404" r="9" fill="#201810"/>
    <circle cx="210" cy="408" r="9" fill="#1a1408"/>
    <circle cx="245" cy="405" r="9" fill="#201810"/>
    <circle cx="280" cy="407" r="9" fill="#1a1408"/>
    <circle cx="315" cy="404" r="9" fill="#201810"/>
    <circle cx="355" cy="408" r="9" fill="#1a1408"/>
    <circle cx="390" cy="405" r="9" fill="#201810"/>
    <circle cx="425" cy="407" r="9" fill="#1a1408"/>
    <circle cx="460" cy="404" r="9" fill="#201810"/>
    <circle cx="495" cy="408" r="9" fill="#1a1408"/>
    <circle cx="530" cy="405" r="9" fill="#201810"/>
    <circle cx="565" cy="407" r="9" fill="#1a1408"/>
    <circle cx="600" cy="404" r="9" fill="#201810"/>
    <circle cx="635" cy="408" r="9" fill="#1a1408"/>
    <circle cx="665" cy="405" r="9" fill="#201810"/>
  </g>

  <!-- Text overlay -->
  <rect y="425" width="800" height="75" fill="rgba(0,0,0,0.78)"/>
  <text x="400" y="461" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#c9a84c" letter-spacing="2">Kerstconcert 2024</text>
  <text x="400" y="483" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.65)" letter-spacing="1">20 DECEMBER · DORPSKERK BENTELO</text>
</svg>
