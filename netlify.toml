[build]
  publish = "."

[context.deploy-preview]
  command = "echo 'skip'"

[context.branch-deploy]
  command = "echo 'skip'"

[[redirects]]
  from = "/leden"
  to = "/leden.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

